name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: package-lock.json
      - name: Install dependencies
        run: npm ci
      - name: Run ESLint
        run: npm run lint

  test-shards:
    needs: lint
    runs-on: ubuntu-latest
    env:
      TOTAL_SHARDS: 2
      DATABASE_URL: postgres://test:test@localhost:5432/testdb
      POSTGRESQL_URL: postgres://test:test@localhost:5432/testdb
      REDIS_URL: redis://localhost:6379
      NODE_ENV: test
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: testdb
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    strategy:
      matrix:
        shard: [1, 2]
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: package-lock.json
      - name: Install dependencies
        run: npm ci
      - name: Typecheck
        run: npm run typecheck
      - name: Build (if not PR)
        if: github.event_name != 'pull_request'
        run: npm run build
      - name: Validate migrations
        run: npm run migrate validate
      - name: Run migrations
        run: npm run migrate up
      - name: Run tests shard
        run: npm test -- --shard=${{ matrix.shard }}/${{ env.TOTAL_SHARDS }} --coverage --coverageDirectory=coverage/shard-${{ matrix.shard }}
      - name: Upload coverage shard
        uses: actions/upload-artifact@v4
        with:
          name: coverage-${{ matrix.shard }}
          path: coverage/shard-${{ matrix.shard }}

  coverage-merge:
    needs: test-shards
    runs-on: ubuntu-latest
    steps:
      - name: Download coverage artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: coverage-*
          path: coverage
      - name: Merge coverage reports
        run: |
          npx nyc merge $(find coverage -type f -name "*.json") > coverage/merged.json
          npx nyc report --reporter=lcov --reporter=text-summary --temp-directory=coverage
          # Fail if thresholds not met
          npx nyc check-coverage --branches 80 --functions 80 --lines 80 --statements 80
