name: CI

on:
  push:
    branches: [main]
    tags: ['*']
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: package-lock.json
      - name: Install dependencies
        run: npm ci
      - name: Run ESLint
        run: npm run lint

  build-test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: testdb
        ports: ["5432:5432"]
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7
        ports: ["6379:6379"]
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgres://test:test@localhost:5432/testdb
      POSTGRESQL_URL: postgres://test:test@localhost:5432/testdb
      REDIS_URL: redis://localhost:6379
      NODE_ENV: test
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: package-lock.json
      - name: Install dependencies
        run: npm ci
      - name: Typecheck
        run: npm run typecheck
      - name: Build
        if: github.event_name != 'pull_request'
        run: npm run build
      - name: Validate migrations
        run: npm run migrate validate
      - name: Run migrations
        run: npm run migrate up
      - name: Run tests
        run: npm test

  openapi-breaking-check:
    name: OpenAPI Breaking‑Change Check
    runs-on: ubuntu-latest
    needs: build-test
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
      - name: Install dependencies
        run: npm ci
      - name: Install oasdiff
        run: npm i -D @redocly/openapi-diff
      - name: Generate spec for base (main)
        run: |
          git fetch origin main
          git checkout origin/main
          npm run generate-openapi > base-openapi.json
      - name: Generate spec for head (PR)
        run: |
          git checkout ${{ github.event.pull_request.head.sha }}
          npm run generate-openapi > head-openapi.json
      - name: Run oasdiff
        id: diff
        run: |
          set -e
          if npx @redocly/openapi-diff break base-openapi.json head-openapi.json > diff.txt; then
            echo "breaking=no" >> $GITHUB_OUTPUT
          else
            echo "breaking=yes" >> $GITHUB_OUTPUT
          fi
      - name: Fail on breaking changes without label
        if: steps.diff.outputs.breaking == 'yes' && !contains(github.event.pull_request.labels.*.name, 'breaking-change-approved')
        run: |
          echo "Breaking changes detected without approved label."
          cat diff.txt
          exit 1
      - name: Comment diff on PR
        if: always()
        uses: peter-evans/create-or-update-comment@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          issue-number: ${{ github.event.pull_request.number }}
          body: |
            ## OpenAPI Breaking‑Check

            \`\`\`
            $(cat diff.txt)
            \`\`\`
            ${{ steps.diff.outputs.breaking == 'yes' && '⚠️ Breaking changes detected. Add `breaking-change-approved` label to override.' || '✅ No breaking changes.' }}

  container-scan:
    name: Container Image Security Scan
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - uses: actions/checkout@v4
      - name: Cache Trivy DB
        uses: actions/cache@v4
        with:
          path: ~/.cache/trivy
          key: trivy-db-${{ runner.os }}
      - name: Install Trivy
        run: |
          sudo apt-get update
          sudo apt-get install -y trivy
      - name: Build Docker image
        run: docker build -t app:${{ github.sha }} .
      - name: Run Trivy scan (high/critical)
        run: trivy image --exit-code 1 --severity HIGH,CRITICAL --format json -o trivy-report.json app:${{ github.sha }}
      - name: Generate SBOM
        run: trivy image --format spdx-json -o sbom.spdx.json app:${{ github.sha }}
      - name: Upload Trivy report
        uses: actions/upload-artifact@v4
        with:
          name: trivy-report
          path: trivy-report.json
      - name: Upload SBOM
        uses: actions/upload-artifact@v4
        with:
          name: sbom
          path: sbom.spdx.json
