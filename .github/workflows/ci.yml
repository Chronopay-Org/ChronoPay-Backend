name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build
        if: github.event_name != 'pull_request'
        run: npm run build

      - name: Run tests
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            npm test -- \
              src/__tests__/feature-flags.service.test.ts \
              src/__tests__/feature-flags.middleware.test.ts \
              src/__tests__/feature-flags.integration.test.ts \
              src/__tests__/feature-flags.registry-coverage.test.ts
          else
            npm test
          fi
